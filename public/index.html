<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuggets — AI Adventures</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="demo-banner" class="demo-banner hidden">
    Demo mode — canned story preview. Set <code>ANTHROPIC_API_KEY</code> on the server for live, fully dynamic stories.
  </div>

  <header class="site-header">
    <h1 class="logo" id="logo">Nuggets</h1>
    <p class="tagline">Every story is yours alone.</p>
  </header>

  <main>
    <!-- Screen 1: scenario selection -->
    <section id="screen-scenario" class="screen">
      <h2 class="screen-title">Choose your world</h2>
      <div id="scenario-grid" class="card-grid"></div>
      <div class="resume-row hidden" id="resume-row">
        <button id="resume-btn" class="btn btn-ghost">↩ Resume your last story</button>
      </div>
    </section>

    <!-- Screen 2: character creation -->
    <section id="screen-character" class="screen hidden">
      <h2 class="screen-title">Who are you?</h2>
      <p class="screen-sub" id="character-scenario-label"></p>

      <label class="field-label" for="char-name">Your name</label>
      <input type="text" id="char-name" maxlength="40" placeholder="e.g. Rowan Ashford" autocomplete="off">

      <label class="field-label">Your archetype</label>
      <div id="archetype-grid" class="card-grid small"></div>

      <label class="field-label">Your defining trait</label>
      <div id="trait-row" class="chip-row"></div>

      <div class="actions">
        <button id="back-to-scenarios" class="btn btn-ghost">← Back</button>
        <button id="begin-btn" class="btn btn-primary" disabled>Begin the story →</button>
      </div>
    </section>

    <!-- Screen 3: the story -->
    <section id="screen-story" class="screen hidden">
      <div class="story-meta">
        <span id="story-title"></span>
        <span id="chapter-count"></span>
      </div>
      <article id="story-text" class="story-text"></article>
      <div id="typing-indicator" class="typing hidden">The storyteller is writing<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>

      <div id="choices-area" class="choices hidden">
        <p class="choices-label">What do you do?</p>
        <div id="choice-buttons"></div>
        <form id="custom-action-form" class="custom-action">
          <input type="text" id="custom-action" maxlength="200" placeholder="…or write your own action" autocomplete="off">
          <button type="submit" class="btn btn-primary">Do it</button>
        </form>
      </div>

      <div id="ending-area" class="ending hidden">
        <p class="ending-mark">⁂&ensp;The End&ensp;⁂</p>
        <button id="new-story-btn" class="btn btn-primary">Begin a new story</button>
      </div>

      <div id="error-area" class="error hidden">
        <p id="error-text"></p>
        <button id="retry-btn" class="btn btn-ghost">Try again</button>
      </div>

      <div class="story-footer">
        <button id="abandon-btn" class="btn btn-ghost btn-small">Abandon story</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
